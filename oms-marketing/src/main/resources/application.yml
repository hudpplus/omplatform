server:
  port: 8083

---
spring:
  config:
    activate:
      on-profile: dev

# p6spy SQL 日志代理
decorator:
  datasource:
    p6spy:
      enable-logging: true
      logging: slf4j
      slow-sql-threshold: 200
      multiline: true

spring:
  application:
    name: oms-marketing

  datasource:
    url: jdbc:mysql://localhost:3306/oms_marketing?useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root

  data:
    redis:
      timeout: 3000ms
      sentinel:
        master: mymaster
        nodes:
          - 127.0.0.1:26379
          - 127.0.0.1:26380
          - 127.0.0.1:26381

  cloud:
    sentinel:
      transport:
        dashboard: localhost:8088
      eager: true
      filter:
        enabled: true

dubbo:
  application:
    name: oms-marketing
  protocol:
    name: dubbo
    port: -1
  registry:
    address: nacos://localhost:8848

rocketmq:
  name-server: localhost:9876
  producer:
    group: oms-marketing-producer

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted

# 链路追踪
management:
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    com.omplatform: DEBUG
  pattern:
    level: "%5p [%X{traceId:-} %X{spanId:-}]"

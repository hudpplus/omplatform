server:
  port: 8082

spring:
  application:
    name: oms-finance
  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/oms_finance?useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

  cloud:
    sentinel:
      transport:
        dashboard: localhost:8088
      eager: true
      filter:
        enabled: true

dubbo:
  application:
    name: oms-finance
  protocol:
    name: dubbo
    port: -1
  registry:
    address: nacos://localhost:8848
  consumer:
    timeout: 5000
    retries: 0

rocketmq:
  name-server: localhost:9876
  producer:
    group: oms-finance-producer

# 支付渠道配置（覆盖 Nacos 默认值，用于本地开发）
payment:
  alipay:
    app-id: 2021000000000000
    private-key: |
      -----BEGIN PRIVATE KEY-----
      （替换为实际支付宝应用私钥）
      -----END PRIVATE KEY-----
    alipay-public-key: （替换为支付宝公钥）
    notify-url: http://localhost:8082/api/payment/callback/alipay
  wechat:
    app-id: wx0000000000000000
    mch-id: 10000000
    api-v3-key: （替换为 API v3 密钥）
    private-key-path: classpath:cert/wechat-apiclient.key
    mch-serial-no: （替换为证书序列号）
    notify-url: http://localhost:8082/api/payment/callback/wechat

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 链路追踪
management:
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    com.omplatform: DEBUG
  pattern:
    level: "%5p [%X{traceId:-} %X{spanId:-}]"

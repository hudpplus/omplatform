# =============================================================================
# OM Platform — 基础设施地址 ConfigMap
# 所有服务共用，通过 envFrom 注入环境变量。
# Spring Boot 使用 relaxed binding 映射到应用配置。
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-endpoints
  namespace: omplatform
  labels:
    app.kubernetes.io/component: infra
data:
  # ---- Nacos ----
  SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: nacos:8848
  SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
  DUBBO_REGISTRY_ADDRESS: nacos://nacos:8848

  # ---- MySQL（通过 ProxySQL） ----
  SPRING_DATASOURCE_HOST: mysql
  SPRING_DATASOURCE_PORT: "6033"
  SPRING_DATASOURCE_USERNAME: root
  SPRING_DATASOURCE_PASSWORD: root

  # ---- Redis Sentinel ----
  SPRING_DATA_REDIS_SENTINEL_MASTER: mymaster
  SPRING_DATA_REDIS_SENTINEL_NODES_0: redis-sentinel:26379
  SPRING_DATA_REDIS_SENTINEL_NODES_1: redis-sentinel:26380
  SPRING_DATA_REDIS_SENTINEL_NODES_2: redis-sentinel:26381

  # ---- RocketMQ ----
  ROCKETMQ_NAME_SERVER: rocketmq-namesrv:9876

  # ---- Elasticsearch ----
  SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200

  # ---- Sentinel ----
  SPRING_CLOUD_SENTINEL_TRANSPORT_DASHBOARD: sentinel-dashboard:8088

  # ---- XXL-Job ----
  XXL_JOB_ADMIN_ADDRESSES: http://xxl-job-admin:8082
  XXL_JOB_ACCESSTOKEN: omplatform

apiVersion: apps/v1
kind: Deployment
metadata:
  name: oms-trade
  namespace: omplatform
  labels:
    app: oms-trade
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oms-trade
  template:
    metadata:
      labels:
        app: oms-trade
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: oms-trade
          image: omplatform/oms-trade:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: oms-trade-config
            - configMapRef:
                name: infra-endpoints
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              memory: "768Mi"
              cpu: "500m"
            limits:
              memory: "1.5Gi"
              cpu: "2"
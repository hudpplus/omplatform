apiVersion: apps/v1
kind: Deployment
metadata:
  name: oms-fulfillment
  namespace: omplatform
  labels:
    app: oms-fulfillment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oms-fulfillment
  template:
    metadata:
      labels:
        app: oms-fulfillment
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: oms-fulfillment
          image: omplatform/oms-fulfillment:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          envFrom:
            - configMapRef:
                name: oms-fulfillment-config
            - configMapRef:
                name: infra-endpoints
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"
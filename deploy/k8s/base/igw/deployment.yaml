apiVersion: apps/v1
kind: Deployment
metadata:
  name: igw
  namespace: omplatform
  labels:
    app: igw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: igw
  template:
    metadata:
      labels:
        app: igw
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: igw
          image: omplatform/igw:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8087
              name: http
          envFrom:
            - configMapRef:
                name: igw-config
            - configMapRef:
                name: infra-endpoints
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1"
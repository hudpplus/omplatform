apiVersion: apps/v1
kind: Deployment
metadata:
  name: egw
  namespace: omplatform
  labels:
    app: egw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: egw
  template:
    metadata:
      labels:
        app: egw
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: egw
          image: omplatform/egw:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8088
              name: http
          envFrom:
            - configMapRef:
                name: egw-config
            - configMapRef:
                name: infra-endpoints
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1"
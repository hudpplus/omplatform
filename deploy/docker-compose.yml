# ============================================================================
# OM Platform — 本地开发环境
# 启动：docker-compose up -d
# 停止：docker-compose down
# 数据持久化在 docker-data/ 目录下
# ============================================================================

version: "3.8"

services:
  # ---- 数据库 ----
  mysql:
    image: mysql:8.0
    container_name: om-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - ./docker-data/mysql:/var/lib/mysql
      - ./sql/init-all-databases.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- 缓存 ----
  redis:
    image: redis:7.2
    container_name: om-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- 注册中心 & 配置中心 ----
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: om-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      JVM_XMS: 256m
      JVM_XMX: 512m
      PREFER_HOST_MODE: hostname
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - ./docker-data/nacos:/home/nacos/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---- 消息队列 ----
  rocketmq-namesrv:
    image: apache/rocketmq:5.2.0
    container_name: om-rmq-namesrv
    restart: unless-stopped
    environment:
      JAVA_OPT_EXT: "-server -Xms128m -Xmx256m"
    command: sh mqnamesrv
    ports:
      - "9876:9876"
    volumes:
      - ./docker-data/rocketmq/namesrv/logs:/home/rocketmq/logs

  rocketmq-broker:
    image: apache/rocketmq:5.2.0
    container_name: om-rmq-broker
    restart: unless-stopped
    depends_on:
      - rocketmq-namesrv
    environment:
      JAVA_OPT_EXT: "-server -Xms256m -Xmx512m"
      NAMESRV_ADDR: rocketmq-namesrv:9876
    command: sh mqbroker -c /home/rocketmq/conf/broker.conf
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    volumes:
      - ./docker-data/rocketmq/broker/logs:/home/rocketmq/logs
      - ./docker-data/rocketmq/broker/store:/home/rocketmq/store
      - ./conf/rocketmq/broker.conf:/home/rocketmq/conf/broker.conf

  rocketmq-dashboard:
    image: apache/rocketmq-dashboard:1.0.0
    container_name: om-rmq-dashboard
    restart: unless-stopped
    depends_on:
      - rocketmq-namesrv
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=rocketmq-namesrv:9876"
    ports:
      - "8081:8080"

  # ---- 定时任务（可选，启动稍慢） ----
  xxl-job-admin:
    image: xuxueli/xxl-job-admin:2.4.1
    container_name: om-xxl-job
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PARAMS: "--spring.datasource.url=jdbc:mysql://mysql:3306/oms_common?useSSL=false&serverTimezone=Asia/Shanghai
               --spring.datasource.username=root
               --spring.datasource.password=root
               --xxl.job.accessToken=omplatform"
    ports:
      - "8082:8080"

  # ---- 搜索引擎 ----
  elasticsearch:
    image: elasticsearch:8.16.0
    container_name: om-es
    restart: unless-stopped
    environment:
      - cluster.name=om-platform
      - node.name=om-es-01
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - "index.number_of_shards=1"
      - "index.number_of_replicas=0"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - ./docker-data/es/data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  kibana:
    image: kibana:8.16.0
    container_name: om-kibana
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"

networks:
  default:
    name: om-network

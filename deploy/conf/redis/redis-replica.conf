# OM Platform — Redis Replica 配置（模板）
# 适用: Redis 7.2
# 端口: 6380/6381（启动时替换）
# 注意: replicaof 由 init-sentinel.sh 动态配置

port ${PORT}
daemonize no
bind 0.0.0.0
protected-mode yes
requirepass omplatform
masterauth omplatform

# 作为从库
replicaof ${MASTER_HOST} ${MASTER_PORT}
replica-serve-stale-data yes
replica-read-only yes
replica-priority 100

# 持久化（从库只读，可关闭持久化以提升性能）
save ""
appendonly no

# 连接
maxclients 10000
timeout 0
tcp-keepalive 300

# 内存
maxmemory 2gb
maxmemory-policy allkeys-lru

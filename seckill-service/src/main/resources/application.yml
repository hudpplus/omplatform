server:
  port: 8082

spring:
  application:
    name: seckill-service
  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/oms_seckill?useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root

  data:
    redis:
      timeout: 3000ms
      sentinel:
        master: mymaster
        nodes:
          - 127.0.0.1:26379
          - 127.0.0.1:26380
          - 127.0.0.1:26381

  # Sentinel 限流熔断
  cloud:
    sentinel:
      transport:
        dashboard: localhost:8088
      eager: true
      filter:
        enabled: true

# Dubbo 配置
dubbo:
  application:
    name: seckill-service
  protocol:
    name: dubbo
    port: -1
  registry:
    address: nacos://localhost:8848
  consumer:
    timeout: 5000
    retries: 0

# RocketMQ
rocketmq:
  name-server: localhost:9876
  producer:
    group: seckill-service-producer

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 链路追踪
management:
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    com.omplatform: DEBUG
  pattern:
    level: "%5p [%X{traceId:-} %X{spanId:-}]"

---
spring:
  config:
    activate:
      on-profile: dev

# p6spy SQL 日志代理（仅 dev 环境生效）
decorator:
  datasource:
    p6spy:
      enable-logging: true
      logging: slf4j
      slow-sql-threshold: 200
      multiline: true

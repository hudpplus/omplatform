server:
  port: 8086

spring:
  application:
    name: oms-channel-adapter
  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/oms_channel_adapter?useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

dubbo:
  application:
    name: oms-channel-adapter
  protocol:
    name: dubbo
    port: -1
  registry:
    address: nacos://localhost:8848
  consumer:
    timeout: 10000
    retries: 0

rocketmq:
  name-server: localhost:9876
  producer:
    group: oms-channel-adapter-producer

# 链路追踪
management:
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    com.omplatform: DEBUG
  pattern:
    level: "%5p [%X{traceId:-} %X{spanId:-}]"

server:
  port: 8086

---
spring:
  config:
    activate:
      on-profile: dev

# p6spy SQL 日志代理
decorator:
  datasource:
    p6spy:
      enable-logging: true
      logging: slf4j
      slow-sql-threshold: 200
      multiline: true

spring:
  application:
    name: oms-channel-adapter
  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/oms_channel_adapter?useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3

  data:
    redis:
      timeout: 3000ms
      sentinel:
        master: mymaster
        nodes:
          - 127.0.0.1:26379
          - 127.0.0.1:26380
          - 127.0.0.1:26381

dubbo:
  application:
    name: oms-channel-adapter
  protocol:
    name: dubbo
    port: -1
  registry:
    address: nacos://localhost:8848
  consumer:
    timeout: 10000
    retries: 0

rocketmq:
  name-server: localhost:9876
  producer:
    group: oms-channel-adapter-producer

# 链路追踪
management:
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    com.omplatform: DEBUG
  pattern:
    level: "%5p [%X{traceId:-} %X{spanId:-}]"
